    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.01em; 
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        /* Animasi Global */
        @keyframes gear-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes gear-rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
        @keyframes scan-line { 
            0% { top: 0%; opacity: 0; } 
            50% { opacity: 0.3; }
            100% { top: 100%; opacity: 0; } 
        }
        
        /* Entrance Animations */
        @keyframes slide-up-fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-entrance { animation: slide-up-fade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

        .gear-spin { animation: gear-rotate 12s linear infinite; }
        .gear-spin-slow { animation: gear-rotate 25s linear infinite; }
        .gear-spin-reverse { animation: gear-rotate-reverse 18s linear infinite; }
        .pulse-text { animation: pulse-soft 2s ease-in-out infinite; }
        
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Scrollbar Dinamis */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .theme-dark .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .theme-dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .theme-light .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .theme-light .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* --- Animasi Kartu Berbalik (Flip Card) --- */
        .card-flip-container {
            perspective: 1500px;
            height: 400px;
        }
        .card-flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-flip-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* Tema Khusus Dark Mode */

            background-color: rgba(30, 41, 59, 0.5);

            border: 1px solid rgba(71, 85, 105, 0.3);

            border: 1px solid #004d66;

            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);

        .loading-screen {

        }

        // ==========================================

        function getStatusStyle(status, isDark) {
            const s = status?.toUpperCase() || '';
            if (isDark) {
                if (s.includes('DONE')) return 'bg-emerald-900/50 text-emerald-400 border-emerald-500/50';
                if (s.includes('APPROV')) return 'bg-amber-900/50 text-amber-400 border-amber-500/50';
                if (s.includes('CANCEL')) return 'bg-red-900/50 text-red-400 border-red-500/50';
                if (s.includes('CONFIRM')) return 'bg-slate-800/50 text-slate-300 border-slate-600/50';
                return 'bg-slate-900/30 text-slate-500 border-slate-800';
            } else {
                if (s.includes('DONE')) return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                if (s.includes('APPROV')) return 'bg-amber-100 text-amber-700 border-amber-200';
                if (s.includes('CANCEL')) return 'bg-red-100 text-red-700 border-red-200';
                if (s.includes('CONFIRM')) return 'bg-slate-100 text-slate-700 border-slate-200';
                return 'bg-gray-50 text-gray-500 border-gray-100';
            }
        }

        function parseCSVToJSON(text) {
            const lines = text.split('\n').filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            const rows = lines.map(line => {
                const currentRow = [];
                let field = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') inQuotes = !inQuotes;
                    else if (line[i] === ',' && !inQuotes) { currentRow.push(field.trim()); field = ''; }
                    else field += line[i];
                }
                currentRow.push(field.trim());
                return currentRow;
            });
            const normalizedHeaders = rows[0].map(h => h.toLowerCase().replace(/\s/g, '').replace(/[^a-z0-9]/g, ''));
            return rows.slice(1).map(row => {
                const findValueStrict = (keywords, blockKeywords = []) => {
                    const cleanKeywords = keywords.map(k => k.toLowerCase().replace(/\s/g, ''));
                    const cleanBlocks = blockKeywords.map(k => k.toLowerCase().replace(/\s/g, ''));
                    let index = normalizedHeaders.findIndex(h => cleanKeywords.some(k => h === k));
                    if (index === -1) index = normalizedHeaders.findIndex(h => cleanKeywords.some(k => h.includes(k)) && !cleanBlocks.some(b => h.includes(b)));
                    return index !== -1 ? (row[index] || '') : '';
                };
                return {
                    date: findValueStrict(['requestdate', 'tanggal', 'timestamp', 'date']),
                    requestedBy: findValueStrict(['requestedby', 'peminta', 'nama', 'user']),
                    rcpId: findValueStrict(['rcpid', 'norcp', 'rcpno'], ['date', 'tanggal', 'time', 'tgl']),
                    status: findValueStrict(['status', 'progress', 'state']),
                    product: findValueStrict(['product', 'barang', 'sparepart', 'item', 'produk']),
                    qty: findValueStrict(['qty', 'jumlah', 'quantity', 'vol']),
                    unit: findValueStrict(['unit', 'satuan', 'uom']),
                    machine: findValueStrict(['machine', 'mesin', 'line', 'area', 'machineline'])
                };
            });
        }

                    <div className={`absolute -right-6 -top-6 opacity-5 group-hover:opacity-10 group-hover:scale-110 transition-all duration-700 ${isDark ? 'text-sky-500' : 'text-blue-900'}`}><Icon name={icon} size={150} /></div>
                    <div className={`${color} text-white p-5 rounded-2xl mb-6 shadow-lg group-hover:rotate-12 transition-transform duration-300`}><Icon name={icon} size={32} /></div>
                    <h2 className={`text-2xl font-black uppercase tracking-tight mb-2 leading-tight ${isDark ? 'text-white' : 'text-slate-800'}`}>{title}</h2>
                    <p className={`font-medium leading-relaxed mb-8 text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{desc}</p>
                    <div className={`mt-auto flex items-center gap-2 font-black uppercase text-[10px] tracking-widest group-hover:gap-4 transition-all ${isDark ? 'text-sky-400' : 'text-blue-700'}`}>MASUK <Icon name="arrow-right" size={16} /></div>
                </button>
            );
        }

        function StatCard({ label, count, color, icon, className, isDark }) {
            return (
                <div className={`p-6 rounded-[2rem] flex items-center gap-6 shadow-sm group hover:shadow-lg transition-all ${isDark ? 'glass-card' : 'bg-white border border-slate-100 shadow-md'} ${className}`}>
                    <div className={`p-4 rounded-2xl animate-float shadow-inner border ${isDark ? `bg-${color}-950/50 text-${color}-400 border-${color}-500/20` : `bg-${color}-50 text-${color}-600 border-${color}-100`}`}><Icon name={icon} size={32} /></div>
                    <div><p className={`text-[10px] font-black uppercase tracking-widest mb-1 ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>{label}</p><h3 className={`text-3xl font-black ${isDark ? `text-${color}-400` : `text-${color}-600`}`}>{count}</h3></div>
                </div>
            );
        }

        function SearchInput({ icon, placeholder, value, onChange, isDark }) {
            return (
                <div className="relative group">
                    <span className={`absolute left-5 top-1/2 -translate-y-1/2 transition-colors ${isDark ? 'text-slate-500 group-focus-within:text-sky-400' : 'text-slate-300 group-focus-within:text-blue-600'}`}><Icon name={icon} size={20} /></span>
                    <input type="text" placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)} className={`w-full pl-14 pr-6 py-4 border-2 rounded-2xl font-bold text-sm outline-none transition-all shadow-sm ${isDark ? 'bg-slate-900/50 border-slate-800 focus:ring-4 focus:ring-sky-500/20 focus:border-sky-500/30 text-white placeholder-slate-600' : 'bg-slate-50 border-slate-100 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/30 text-slate-700'}`} />
                </div>
            );
        }

        function GuideSelectCard({ icon, title, onClick, isDark }) {
            return (
                <button onClick={onClick} className={`p-8 rounded-[2rem] border transition-all group flex flex-col items-center text-center gap-4 active:scale-95 ${isDark ? 'glass-card border-slate-800 hover:border-sky-400/50' : 'bg-white border-slate-100 shadow-lg hover:border-blue-400'}`}>
                    <div className={`p-5 rounded-2xl group-hover:scale-110 transition-transform ${isDark ? 'bg-sky-500/10 text-sky-400' : 'bg-blue-600/10 text-blue-600'}`}><Icon name={icon} size={40} /></div>
                    <h3 className={`text-sm font-black uppercase tracking-wider ${isDark ? 'text-white' : 'text-slate-800'}`}>{title}</h3>
                    <Icon name="arrow-right" className={`${isDark ? 'text-slate-600 group-hover:text-sky-400' : 'text-slate-300 group-hover:text-blue-600'} transition-colors`} />
                </button>
            );
        }

        function K3Item({ text, icon, color, isDark }) {
            return (
                <div className={`p-5 rounded-2xl flex items-center gap-4 border ${isDark ? 'glass-card' : 'bg-white border-slate-100 shadow-sm'} ${color === 'amber' ? 'border-amber-500/20' : 'border-emerald-500/20'}`}>
                    <Icon name={icon} className={color === 'amber' ? 'text-amber-500' : 'text-emerald-500'} />
                    <span className={isDark ? 'text-slate-300' : 'text-slate-700'}>{text}</span>
                </div>
            );
        }

        function GmpItem({ title, desc }) {
            return (
                <div className="flex gap-4 items-start">
                    <div className="w-1.5 h-10 bg-sky-500 rounded-full mt-1"></div>
                    <div>
                        <h4 className="font-black text-sky-400 text-xs uppercase tracking-widest">{title}</h4>
                        <p className="text-slate-400 text-[11px] font-bold uppercase leading-relaxed mt-1">{desc}</p>
                    </div>
                </div>
            );
        }

        // ==========================================
        // KOMPONEN UTAMA
        // ==========================================
        function App() {
            const [isBooting, setIsBooting] = useState(true);
            const [theme, setTheme] = useState(localStorage.getItem('skf_theme') || 'dark');
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [openAccordion, setOpenAccordion] = useState(null);
            
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [user, setUser] = useState(null);
            
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('skf_url_manual') || "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4knvzFbNvsWJjs88zESzputbexr6c6Yqyl_L8aAH8F9JKW0tA5cjgnzF5UJI7qZLeo6r0x9IoPDBO/pub?output=csv");
            const [isConfigOpen, setIsConfigOpen] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const isDark = theme === 'dark';

            useEffect(() => {
                document.body.className = isDark ? "theme-dark bg-[#020617] text-slate-100" : "theme-light bg-slate-50 text-slate-900";
                localStorage.setItem('skf_theme', theme);
            }, [theme]);

            const [searchUser, setSearchUser] = useState('');
            const [searchProduct, setSearchProduct] = useState('');
            const [searchMachine, setSearchMachine] = useState('');
            const [statusFilter, setStatusFilter] = useState('Semua');
            const [monthFilter, setMonthFilter] = useState('Semua');
            const [yearFilter, setYearFilter] = useState('Semua');

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const dateStr = item.date || "";
                    const match = (val, search) => (val || '').toLowerCase().includes(search.toLowerCase());
                    return match(item.requestedBy, searchUser) && 
                           match(item.product, searchProduct) && 
                           match(item.machine, searchMachine) && 
                           (statusFilter === 'Semua' || (item.status || '').toUpperCase() === statusFilter.toUpperCase()) &&
                           (monthFilter === 'Semua' || dateStr.includes(monthFilter)) &&
                           (yearFilter === 'Semua' || dateStr.includes(yearFilter));
                });
            }, [data, searchUser, searchProduct, searchMachine, statusFilter, monthFilter, yearFilter]);

            const rcpStats = useMemo(() => {
                const stats = { DONE: new Set(), APPROVED: new Set(), CONFIRMED: new Set(), CANCELED: new Set() };
                filteredData.forEach(item => {
                    const s = (item.status || '').toUpperCase();
                    const id = item.rcpId;
                    if (!id || id.trim() === '') return;
                    if (s.includes('DONE')) stats.DONE.add(id);
                    else if (s.includes('APPROV')) stats.APPROVED.add(id);
                    else if (s.includes('CONFIRM')) stats.CONFIRMED.add(id);
                    else if (s.includes('CANCEL')) stats.CANCELED.add(id);
                });
                return { DONE: stats.DONE.size, APPROVED: stats.APPROVED.size, CONFIRMED: stats.CONFIRMED.size, CANCELED: stats.CANCELED.size };
            }, [filteredData]);

            const availableYears = useMemo(() => {
                const years = data.map(item => {
                    const parts = (item.date || '').split('-');
                    return parts.length === 3 ? parts[2] : null;
                }).filter(y => y !== null);
                return [...new Set(years)].sort((a, b) => b - a);
            }, [data]);

            useEffect(() => {
                if (currentPage === 'history' && chartRef.current && !loading) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();
                    const textColor = isDark ? '#94a3b8' : '#64748b';
                    const gridColor = isDark ? 'rgba(71, 85, 105, 0.1)' : 'rgba(226, 232, 240, 0.8)';
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['DONE', 'APPROVED', 'CONFIRMED', 'CANCELED'],
                            datasets: [{
                                label: 'Jumlah RCP',
                                data: [rcpStats.DONE, rcpStats.APPROVED, rcpStats.CONFIRMED, rcpStats.CANCELED],
                                backgroundColor: isDark ? 
                                    ['rgba(16, 185, 129, 0.6)', 'rgba(245, 158, 11, 0.6)', 'rgba(148, 163, 184, 0.6)', 'rgba(239, 68, 68, 0.6)'] :
                                    ['#10b981', '#f59e0b', '#94a3b8', '#ef4444'],
                                borderColor: isDark ? ['#10b981', '#f59e0b', '#94a3b8', '#ef4444'] : 'transparent',
                                borderWidth: isDark ? 2 : 0, borderRadius: 12, barThickness: 40
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { 
                                y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor } }, 
                                x: { grid: { display: false }, ticks: { color: textColor } } 
                            }
                        }
                    });
                }
            }, [rcpStats, currentPage, loading, theme]);

            const fetchDataInternal = async (url) => {
                if (!url) return;
                setLoading(true);
                try {
                    const response = await fetch(`${url}&t=${new Date().getTime()}`);
                    const text = await response.text();
                    setData(parseCSVToJSON(text));
                    localStorage.setItem('skf_url_manual', url);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const handleConnect = async () => {
                setLoading(true);
                try {
                    await fetchDataInternal(sheetUrl);
                } catch (e) { } finally { setLoading(false); }
            };

            useEffect(() => {
                const init = async () => {
                    const timer = setTimeout(() => setIsBooting(false), 3200);
                    fetchDataInternal(sheetUrl);
                    return () => clearTimeout(timer);
                };
                init();
            }, []);

            if (isBooting) return <LoadingScreen isDark={isDark} />;

            return (
                <div className={`min-h-screen transition-colors duration-500 ${isDark ? 'text-slate-100' : 'text-slate-900'}`}>
                    <header className={`border-b p-6 shadow-2xl relative overflow-hidden z-20 backdrop-blur-md sticky top-0 ${isDark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-slate-200'}`}>
                        <div className="max-w-[1600px] mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-6 animate-entrance">
                                <button onClick={() => setCurrentPage('dashboard')} className={`p-4 rounded-2xl shadow-xl border flex items-center justify-center hover:scale-105 transition-transform ${isDark ? 'bg-sky-500/20 border-sky-500/30 text-sky-400' : 'bg-blue-600/10 border-blue-600/20 text-blue-600'}`}>
                                    <Icon name="wrench" size={36} />
                                </button>
                                <div>
                                    <h1 className={`font-black text-xl md:text-3xl uppercase italic leading-none ${isDark ? 'text-white' : 'text-blue-900'}`}>SISTEM INFORMASI</h1>
                                    <p className={`text-xs md:text-sm font-bold uppercase tracking-[0.2em] mt-1 border-l-4 pl-3 ${isDark ? 'text-sky-300 border-sky-400' : 'text-blue-600 border-blue-700'}`}>DEPARTEMEN TEKNIK SKF</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => setTheme(isDark ? 'light' : 'dark')}
                                    className={`p-3 rounded-xl border transition-all active:scale-95 shadow-lg flex items-center gap-2 ${isDark ? 'bg-slate-800 border-slate-700 text-amber-400 hover:bg-slate-700' : 'bg-slate-100 border-slate-200 text-blue-900 hover:bg-slate-200'}`}
                                >
                                    <Icon name={isDark ? "sun" : "moon"} size={20} />
                                    <span className="hidden md:block text-[10px] font-black uppercase tracking-widest">{isDark ? 'Light' : 'Dark'}</span>
                                </button>
                                
                                <div className={`p-3 rounded-xl border hidden sm:flex items-center gap-3 ${isDark ? 'bg-slate-800/80 border-slate-700 text-sky-400' : 'bg-blue-50 border-blue-100 text-blue-800'}`}>
                                    <div className={`w-2.5 h-2.5 rounded-full animate-pulse ${isDark ? 'bg-sky-400 shadow-[0_0_10px_#38bdf8]' : 'bg-blue-600'}`}></div>
                                    <span className="text-[10px] font-black uppercase tracking-wider">PROFESIONAL & BERINTEGRITAS</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto p-6 md:p-10 relative z-10">
                        {currentPage === 'dashboard' ? (
                            <div className="space-y-10">
                                <div className="fixed inset-0 pointer-events-none z-0 opacity-[0.05]">
                                    <Icon name="settings" size={600} className={`absolute -top-40 -left-40 gear-spin-slow ${isDark ? 'text-blue-500' : 'text-blue-900'}`} />
                                    <Icon name="settings" size={400} className={`absolute bottom-20 -right-20 gear-spin-reverse ${isDark ? 'text-sky-500' : 'text-sky-800'}`} />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <MenuCard isDark={isDark} icon="clipboard-list" title="Riwayat Permintaan" desc="Monitoring status pengadaan sparepart." onClick={() => setCurrentPage('history')} color="bg-sky-600" className="animate-entrance delay-100" />
                                    <MenuCard isDark={isDark} icon="users" title="Struktur Jabatan" desc="Hierarki dan pembagian tugas personil." onClick={() => setCurrentPage('structure')} color="bg-indigo-600" className="animate-entrance delay-200" />
                                    <MenuCard isDark={isDark} icon="book-open" title="Panduan" desc="Pusat instruksi tim teknik, K3, & GMP." onClick={() => setCurrentPage('guides')} color="bg-emerald-600" className="animate-entrance delay-300" />
                                    <MenuCard isDark={isDark} icon="library" title="Manual Book" desc="Akses direktori manual book peralatan." onClick={() => window.open("https://drive.google.com/drive/folders/1uJyhaFhVX9hED5jiOIzdKc-8plEg0Z1_?usp=drive_link", "_blank")} color="bg-amber-600" className="animate-entrance delay-400" />
                                </div>
                            </div>
                        ) : currentPage === 'history' ? (
                            <div className="space-y-8 fade-in">
                                <div className="flex items-center justify-between gap-4">
                                    <button onClick={() => setCurrentPage('dashboard')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                    <div className="flex gap-2">
                                        <button onClick={() => setIsConfigOpen(!isConfigOpen)} className={`p-2.5 rounded-xl border transition-all ${isDark ? 'bg-slate-800 border-slate-700 text-white hover:bg-slate-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}><Icon name="settings" size={20} /></button>
                                        <button onClick={() => fetchDataInternal(sheetUrl)} disabled={loading} className={`px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-wider flex items-center gap-2 transition-all shadow-lg active:scale-95 disabled:opacity-50 ${isDark ? 'bg-sky-500 text-slate-950' : 'bg-blue-700 text-white'}`}><Icon name="refresh-cw" size={18} spin={loading} /> {loading ? 'MEMUAT...' : 'SYNC SHEET'}</button>
                                    </div>
                                </div>
                                {isConfigOpen && (
                                    <div className={`p-8 rounded-[2.5rem] shadow-2xl animate-entrance ${isDark ? 'glass-card' : 'bg-white border border-slate-100'}`}>
                                        <h2 className={`text-xl font-black mb-4 flex items-center gap-3 uppercase ${isDark ? 'text-sky-400' : 'text-blue-900'}`}><Icon name="database" /> Database Link</h2>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <input type="text" placeholder="URL CSV Google Sheet..." className={`flex-1 p-4 border-2 rounded-2xl outline-none focus:ring-4 font-bold ${isDark ? 'bg-slate-900/50 border-slate-700 text-white' : 'bg-slate-50 border-slate-100'}`} value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} />
                                            <button onClick={() => { handleConnect(); setIsConfigOpen(false); }} className={`px-10 py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 ${isDark ? 'bg-sky-500 text-slate-950' : 'bg-blue-700 text-white'}`}>SIMPAN</button>
                                        </div>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-5">
                                    <StatCard isDark={isDark} label="DONE" count={rcpStats.DONE} color="emerald" icon="check-circle" className="animate-entrance delay-100" />
                                    <StatCard isDark={isDark} label="APPROVED" count={rcpStats.APPROVED} color="amber" icon="shield-check" className="animate-entrance delay-200" />
                                    <StatCard isDark={isDark} label="CONFIRMED" count={rcpStats.CONFIRMED} color="slate" icon="clock" className="animate-entrance delay-300" />
                                    <StatCard isDark={isDark} label="CANCELED" count={rcpStats.CANCELED} color="red" icon="x-circle" className="animate-entrance delay-400" />
                                </div>
                                <div className={`p-8 rounded-[2.5rem] shadow-sm animate-entrance delay-500 ${isDark ? 'glass-card' : 'bg-white border'}`}>
                                    <div className="flex items-center gap-2 mb-6 text-xs font-black uppercase opacity-70"><Icon name="bar-chart-big" /> Visualisasi Perbandingan Status RCP</div>
                                    <div className="h-[300px] w-full relative"><canvas ref={chartRef}></canvas></div>
                                </div>
                                <div className={`p-8 rounded-[2.5rem] shadow-sm space-y-6 ${isDark ? 'glass-card' : 'bg-white border'}`}>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <SearchInput isDark={isDark} icon="user" placeholder="Requested By..." value={searchUser} onChange={setSearchUser} />
                                        <SearchInput isDark={isDark} icon="package-search" placeholder="Product / Sparepart..." value={searchProduct} onChange={setSearchProduct} />
                                        <SearchInput isDark={isDark} icon="cpu" placeholder="Machine Line..." value={searchMachine} onChange={setSearchMachine} />
                                    </div>
                                    <div className="flex flex-wrap gap-4 items-center pt-2">
                                        <select className={`border p-3.5 rounded-2xl font-black text-[11px] w-full md:w-48 uppercase transition-colors ${isDark ? 'bg-slate-900/50 border-slate-700 text-slate-300 hover:border-sky-400' : 'bg-slate-50 border-slate-200 text-slate-700 hover:border-blue-400'}`} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}><option value="Semua">PENAPIS: STATUS</option><option value="DONE">DONE</option><option value="APPROVED">APPROVED</option><option value="CONFIRMED">CONFIRMED</option><option value="CANCELED">CANCELED</option></select>
                                        <select className={`border p-3.5 rounded-2xl font-black text-[11px] w-full md:w-40 uppercase transition-colors ${isDark ? 'bg-slate-900/50 border-slate-700 text-slate-300 hover:border-sky-400' : 'bg-slate-50 border-slate-200 text-slate-700 hover:border-blue-400'}`} value={monthFilter} onChange={e => setMonthFilter(e.target.value)}><option value="Semua">PENAPIS: BULAN</option>{listMonths.map(m => <option key={m.val} value={m.val}>{m.name.toUpperCase()}</option>)}</select>
                                        <select className={`border p-3.5 rounded-2xl font-black text-[11px] w-full md:w-32 uppercase transition-colors ${isDark ? 'bg-slate-900/50 border-slate-700 text-slate-300 hover:border-sky-400' : 'bg-slate-50 border-slate-200 text-slate-700 hover:border-blue-400'}`} value={yearFilter} onChange={e => setYearFilter(e.target.value)}><option value="Semua">PENAPIS: TAHUN</option>{availableYears.map(y => <option key={y} value={y}>{y}</option>)}</select>
                                        <button onClick={() => window.print()} className={`ml-auto px-8 py-3.5 rounded-2xl font-black text-[11px] flex items-center gap-3 shadow-lg active:scale-95 uppercase tracking-wider text-white ${isDark ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-blue-700 hover:bg-blue-600'}`}><Icon name="share-2" size={18} /> Cetak Laporan</button>
                                    </div>
                                    <div className={`overflow-x-auto rounded-[1.5rem] border custom-scrollbar ${isDark ? 'border-slate-800' : 'border-slate-100'}`}>
                                        <table className="w-full text-left">
                                            <thead className={`border-b ${isDark ? 'bg-slate-900/80 border-slate-800 text-slate-500' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                <tr>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-xs">Date</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-xs">Requested By</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-xs">RCP ID</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-center text-xs">Status</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-xs">Product</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-center text-xs">Qty</th>
                                                    <th className="px-6 py-6 text-[10px] font-black uppercase text-xs">Machine Line</th>
                                                </tr>
                                            </thead>
                                            <tbody className={`divide-y ${isDark ? 'divide-slate-800/50' : 'divide-slate-50'}`}>
                                                {filteredData.length === 0 ? (<tr><td colSpan="7" className="p-20 text-center opacity-30 uppercase font-black tracking-widest text-xs text-slate-500">Data Tidak Ditemukan</td></tr>) : (
                                                    filteredData.map((item, i) => (
                                                        <tr key={i} className={`transition-all duration-300 ${isDark ? 'hover:bg-slate-800/30' : 'hover:bg-blue-50/50'}`}>
                                                            <td className="px-6 py-5 whitespace-nowrap text-[10px] font-bold opacity-60">{item.date || '-'}</td>
                                                            <td className={`px-6 py-5 whitespace-nowrap text-xs font-black uppercase ${isDark ? 'text-slate-200' : 'text-slate-700'}`}>{item.requestedBy || '-'}</td>
                                                            <td className="px-6 py-5 whitespace-nowrap"><span className={`text-[10px] font-black px-3 py-1.5 rounded-lg border ${isDark ? 'text-sky-400 bg-sky-950/40 border-sky-900/50' : 'text-blue-700 bg-blue-50 border-blue-100'}`}>{item.rcpId || '-'}</span></td>
                                                            <td className="px-6 py-5 whitespace-nowrap text-center"><span className={`inline-block min-w-[90px] px-3 py-2 rounded-xl text-[9px] font-black uppercase border shadow-sm ${getStatusStyle(item.status, isDark)}`}>{item.status || 'N/A'}</span></td>
                                                            <td className={`px-6 py-5 text-sm font-black uppercase leading-tight ${isDark ? 'text-slate-200' : 'text-slate-900'}`}>{item.product || 'N/A'}</td>
                                                            <td className={`px-6 py-5 whitespace-nowrap text-xs font-black text-center ${isDark ? 'text-sky-400' : 'text-blue-900'}`}>{item.qty || '0'}</td>
                                                            <td className="px-6 py-5 whitespace-nowrap text-[10px] font-black text-slate-500 italic opacity-80">{item.machine || 'UMUM'}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : currentPage === 'structure' ? (
                            <div className="space-y-10 fade-in">
                                <button onClick={() => setCurrentPage('dashboard')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                <div className="text-center animate-entrance">
                                    <h2 className={`text-4xl font-black uppercase tracking-tighter italic drop-shadow-[0_0_15px_rgba(56,189,248,0.3)] ${isDark ? 'text-sky-400' : 'text-blue-900'}`}>STRUKTUR JABATAN DEPARTEMEN TEKNIK</h2>
                                    <p className="text-xs font-bold text-slate-500 mt-2 uppercase tracking-[0.4em]">CV SURYA KENCANA FOOD</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {orgData.map((section) => (
                                        <OrganizationCard key={section.id} section={section} isDark={isDark} />
                                    ))}
                                </div>
                            </div>
                        ) : currentPage === 'guides' ? (
                            <div className="space-y-10 fade-in">
                                <button onClick={() => setCurrentPage('dashboard')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                <div className="text-center animate-entrance">
                                    <h2 className={`text-4xl font-black uppercase tracking-tighter italic drop-shadow-[0_0_15px_rgba(56,189,248,0.3)] ${isDark ? 'text-sky-400' : 'text-blue-900'}`}>DOKUMENTASI & STANDAR KERJA</h2>
                                    <p className="text-xs font-bold text-slate-500 mt-2 uppercase tracking-[0.4em]">CV SURYA KENCANA FOOD</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <GuideSelectCard isDark={isDark} icon="repeat" title="Alur Permintaan Barang" onClick={() => setCurrentPage('guide-request-flow')} />
                                    <GuideSelectCard isDark={isDark} icon="shield-alert" title="Panduan K3 Umum & Listrik" onClick={() => setCurrentPage('guide-k3')} />
                                    <GuideSelectCard isDark={isDark} icon="check-square" title="GMP 5R Lingkungan Pabrik" onClick={() => setCurrentPage('guide-gmp')} />
                                </div>
                            </div>
                        ) : currentPage === 'guide-request-flow' ? (
                            <div className="space-y-10 fade-in">
                                <button onClick={() => setCurrentPage('guides')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                <main className="max-w-[1200px] mx-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {requestFlow.map((step, idx) => (
                                            <div key={step.id} className={`p-6 rounded-3xl flex items-center gap-6 animate-entrance ${isDark ? 'glass-card' : 'bg-white border shadow-lg'}`} style={{animationDelay: `${idx * 100}ms`}}>
                                                <div className="step-pill">{step.id}</div>
                                                <div>
                                                    <h3 className={`font-black uppercase text-sm mb-1 ${isDark ? 'text-sky-400' : 'text-blue-800'}`}>{step.title}</h3>
                                                    <p className={`text-xs font-medium leading-relaxed ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{step.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </main>
                            </div>
                        ) : currentPage === 'guide-k3' ? (
                            <div className="space-y-10 fade-in">
                                <button onClick={() => setCurrentPage('guides')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                <main className="max-w-[1200px] mx-auto space-y-12">
                                    <section className="animate-entrance">
                                        <h2 className={`text-2xl font-black mb-6 flex items-center gap-3 ${isDark ? 'text-sky-400' : 'text-blue-900'}`}><Icon name="shield" size={28} /> K3 UMUM</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-bold uppercase leading-loose">
                                            <K3Item isDark={isDark} text="Wajib Menggunakan APD Lengkap (Sepatu Safety, Helm, Masker)" icon="check-circle" color="emerald" />
                                            <K3Item isDark={isDark} text="Patuhi Rambu Peringatan & Jalur Hijau" icon="check-circle" color="emerald" />
                                            <K3Item isDark={isDark} text="Pastikan Kondisi Fisik Fit Sebelum Bekerja" icon="check-circle" color="emerald" />
                                            <K3Item isDark={isDark} text="Laporkan Segera Kondisi Tidak Aman" icon="check-circle" color="emerald" />
                                        </div>
                                    </section>
                                    <section className="animate-entrance delay-200">
                                        <h2 className="text-2xl font-black text-amber-500 mb-6 flex items-center gap-3"><Icon name="zap" size={28} /> K3 LISTRIK</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-bold uppercase leading-loose">
                                            <K3Item isDark={isDark} text="Gunakan Alat Kerja Berisolasi Standar" icon="alert-triangle" color="amber" />
                                            <K3Item isDark={isDark} text="Prosedur LOTO Wajib Dilakukan" icon="alert-triangle" color="amber" />
                                            <K3Item isDark={isDark} text="Jangan Bekerja Sendirian di Sirkuit Bertegangan" icon="alert-triangle" color="amber" />
                                            <K3Item isDark={isDark} text="Periksa Grounding Panel Secara Berkala" icon="alert-triangle" color="amber" />
                                        </div>
                                    </section>
                                </main>
                            </div>
                        ) : currentPage === 'guide-gmp' && (
                            <div className="space-y-10 fade-in">
                                <button onClick={() => setCurrentPage('guides')} className={`px-5 py-2.5 rounded-xl font-bold text-xs uppercase flex items-center gap-2 active:scale-95 transition-all ${isDark ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border hover:bg-slate-50 text-slate-700'}`}><Icon name="chevron-left" /> KEMBALI</button>
                                <main className="max-w-[1200px] mx-auto space-y-6 text-center sm:text-left">
                                    <div className={`p-8 rounded-3xl border-sky-900/30 ${isDark ? 'glass-card' : 'bg-white border shadow-lg'}`}>
                                        <h2 className={`text-xl font-black mb-8 uppercase tracking-widest ${isDark ? 'text-sky-400' : 'text-blue-900'}`}>PRINSIP 5R (Standard Makanan)</h2>
                                        <div className="space-y-6">
                                            <GmpItem title="RINGKAS (SEIRI)" desc="Singkirkan barang tak perlu dari area mesin." />
                                            <GmpItem title="RAPI (SEITON)" desc="Simpan alat di Toolbox/Shadow Board." />
                                            <GmpItem title="RESIK (SEISO)" desc="Bersihkan oli/logam segera setelah kerja." />
                                            <GmpItem title="RAWAT (SEIKETSU)" desc="Pertahankan standar kebersihan berkelanjutan." />
                                            <GmpItem title="RAJIN (SHITSUKE)" desc="Jadikan 5R budaya kerja harian." />
                                        </div>
                                    </div>
                                </main>
                            </div>
                        )}
                    </main>

                    <footer className={`max-w-[1600px] mx-auto px-10 py-10 border-t mt-20 flex justify-between items-center opacity-40 ${isDark ? 'border-slate-800' : 'border-slate-200'}`}>
                        <div className="flex items-center gap-3"><Icon name="wrench" size={20} className={isDark ? 'text-sky-500' : 'text-blue-800'}/><p className="text-[10px] font-black uppercase tracking-widest">SKF Industrial Solution System</p></div>
                        <p className="text-[10px] font-black uppercase tracking-widest">&copy; 2026 DEPT TEKNIK SKF</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
